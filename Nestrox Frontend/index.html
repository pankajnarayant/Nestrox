<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nestrox — Login or create your account to get started.">
  <title>Nestrox — Login & Register</title>
  <link rel="icon" href="../Nestrox Logo & Brand/Nestrox_Logo_No_Bg.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== Main Container ===== -->
  <div class="auth-container">

    <!-- Branding -->
    <div class="brand">
      <img src="../Nestrox Logo & Brand/Nestrox_Logo_No_Bg.png" alt="Nestrox Logo" class="brand-logo">
    </div>

    <!-- Auth Card -->
    <div class="auth-card">

      <!-- Tab Switcher -->
      <div class="tab-bar">
        <button class="tab active" id="tab-login" data-target="login">Login</button>
        <button class="tab" id="tab-register" data-target="register">Register</button>
        <span class="tab-indicator"></span>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <form class="auth-form active" id="form-login" novalidate autocomplete="off">

        <div class="field">
          <label for="login-identifier">Username or Email</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
            <input type="text" id="login-identifier" placeholder="Enter username or email" required>
          </div>
          <span class="error-msg" id="err-login-identifier"></span>
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V6c0-1.7 1.3-3 3-3s3 1.3 3 3v2z"/></svg>
            <input type="password" id="login-password" placeholder="Enter password" required>
            <button type="button" class="toggle-pw" data-target="login-password" aria-label="Toggle password visibility">
              <svg class="eye-open" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5c-1.7-4.4-6-7.5-11-7.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24"><path d="M12 7c2.8 0 5 2.2 5 5 0 .6-.1 1.3-.4 1.8l3 3c1.5-1.3 2.7-3 3.4-4.8-1.7-4.4-6-7.5-11-7.5-1.4 0-2.7.3-4 .7l2.2 2.2c.5-.3 1.2-.4 1.8-.4zM2 4.3l2.3 2.3.4.4C3.2 8.3 2 10 1 12c1.7 4.4 6 7.5 11 7.5 1.6 0 3-.3 4.4-.8l.4.4 2.9 2.9 1.3-1.3L3.3 3 2 4.3zm5.5 5.5 1.6 1.6c0 .2-.1.4-.1.6 0 1.7 1.3 3 3 3 .2 0 .4 0 .6-.1l1.6 1.6c-.7.3-1.4.5-2.2.5-2.8 0-5-2.2-5-5 0-.8.2-1.5.5-2.2zm4.3-.8 3.1 3.1V12c0-1.7-1.3-3-3-3h-.1z"/></svg>
            </button>
          </div>
          <span class="error-msg" id="err-login-password"></span>
        </div>

        <div class="field-row">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember-me">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="link" id="forgot-pw">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Login</button>

        <p class="switch-text">Don't have an account? <button type="button" class="link switch-form" data-target="register">Register</button></p>
      </form>

      <!-- ===== REGISTER FORM ===== -->
      <form class="auth-form" id="form-register" novalidate autocomplete="off">

        <div class="field">
          <label for="reg-fullname">Full Name</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
            <input type="text" id="reg-fullname" placeholder="Enter your full name" required>
          </div>
          <span class="error-msg" id="err-reg-fullname"></span>
        </div>

        <div class="field">
          <label for="reg-username">Username</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="reg-username" placeholder="Choose a username" required>
          </div>
          <span class="error-msg" id="err-reg-username"></span>
        </div>

        <div class="field">
          <label for="reg-email">Email</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
            <input type="email" id="reg-email" placeholder="you@gmail.com" required>
          </div>
          <span class="error-msg" id="err-reg-email"></span>
        </div>

        <div class="field">
          <label for="reg-mobile">Mobile Number</label>
          <div class="input-wrap mobile-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M6.6 10.8a15.2 15.2 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.2 11.4 11.4 0 0 0 3.6.6 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.3.2 2.5.6 3.6a1 1 0 0 1-.3 1l-2.2 2.2z"/></svg>
            <button type="button" class="country-trigger" id="country-trigger" aria-label="Select country code">
              <span class="ct-flag"></span>
              <span class="ct-dial"></span>
              <svg class="ct-arrow" viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z"/></svg>
            </button>
            <input type="hidden" id="country-code" value="+91">
            <input type="tel" id="reg-mobile" placeholder="Mobile number" required>
            <div class="country-dropdown" id="country-dropdown">
              <div class="country-search-wrap">
                <input type="text" id="country-search" placeholder="Search country..." autocomplete="off">
              </div>
              <ul class="country-list" id="country-list"></ul>
            </div>
          </div>
          <span class="error-msg" id="err-reg-mobile"></span>
        </div>

        <div class="field">
          <label for="reg-password">Password</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V6c0-1.7 1.3-3 3-3s3 1.3 3 3v2z"/></svg>
            <input type="password" id="reg-password" placeholder="Create a password" required>
            <button type="button" class="toggle-pw" data-target="reg-password" aria-label="Toggle password visibility">
              <svg class="eye-open" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5c-1.7-4.4-6-7.5-11-7.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24"><path d="M12 7c2.8 0 5 2.2 5 5 0 .6-.1 1.3-.4 1.8l3 3c1.5-1.3 2.7-3 3.4-4.8-1.7-4.4-6-7.5-11-7.5-1.4 0-2.7.3-4 .7l2.2 2.2c.5-.3 1.2-.4 1.8-.4zM2 4.3l2.3 2.3.4.4C3.2 8.3 2 10 1 12c1.7 4.4 6 7.5 11 7.5 1.6 0 3-.3 4.4-.8l.4.4 2.9 2.9 1.3-1.3L3.3 3 2 4.3zm5.5 5.5 1.6 1.6c0 .2-.1.4-.1.6 0 1.7 1.3 3 3 3 .2 0 .4 0 .6-.1l1.6 1.6c-.7.3-1.4.5-2.2.5-2.8 0-5-2.2-5-5 0-.8.2-1.5.5-2.2zm4.3-.8 3.1 3.1V12c0-1.7-1.3-3-3-3h-.1z"/></svg>
            </button>
          </div>
          <span class="error-msg" id="err-reg-password"></span>
          <div class="pw-strength" id="pw-strength">
            <div class="pw-bar"><span></span></div>
            <small class="pw-label"></small>
          </div>
        </div>

        <div class="field">
          <label for="reg-confirm">Confirm Password</label>
          <div class="input-wrap">
            <svg class="field-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V6c0-1.7 1.3-3 3-3s3 1.3 3 3v2z"/></svg>
            <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
            <button type="button" class="toggle-pw" data-target="reg-confirm" aria-label="Toggle password visibility">
              <svg class="eye-open" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5c-1.7-4.4-6-7.5-11-7.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24"><path d="M12 7c2.8 0 5 2.2 5 5 0 .6-.1 1.3-.4 1.8l3 3c1.5-1.3 2.7-3 3.4-4.8-1.7-4.4-6-7.5-11-7.5-1.4 0-2.7.3-4 .7l2.2 2.2c.5-.3 1.2-.4 1.8-.4zM2 4.3l2.3 2.3.4.4C3.2 8.3 2 10 1 12c1.7 4.4 6 7.5 11 7.5 1.6 0 3-.3 4.4-.8l.4.4 2.9 2.9 1.3-1.3L3.3 3 2 4.3zm5.5 5.5 1.6 1.6c0 .2-.1.4-.1.6 0 1.7 1.3 3 3 3 .2 0 .4 0 .6-.1l1.6 1.6c-.7.3-1.4.5-2.2.5-2.8 0-5-2.2-5-5 0-.8.2-1.5.5-2.2zm4.3-.8 3.1 3.1V12c0-1.7-1.3-3-3-3h-.1z"/></svg>
            </button>
          </div>
          <span class="error-msg" id="err-reg-confirm"></span>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>

        <p class="switch-text">Already have an account? <button type="button" class="link switch-form" data-target="login">Login</button></p>
      </form>

    </div><!-- /auth-card -->

    <!-- Toast container -->
    <div id="toast-container"></div>

    <p class="footer-note">&copy; 2026 Nestrox. All rights reserved.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
